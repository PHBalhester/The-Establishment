[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

# Arc Network Configuration
[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
arc_mainnet = "${ARC_MAINNET_RPC_URL}"

[etherscan]
arc_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.testnet.arc.network/api" }
arc_mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.arc.network/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
